<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pawvlog — Únete a la manada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/landing.css">
  <link rel="stylesheet" href="css/auth.css">
</head>

<body>

  <svg width="0" height="0" style="position:absolute">
    <symbol id="paw" viewBox="0 0 100 100">
      <ellipse cx="50" cy="66" rx="27" ry="23" />
      <circle cx="19" cy="36" r="13" />
      <circle cx="42" cy="17" r="12.5" />
      <circle cx="65" cy="17" r="12.5" />
      <circle cx="86" cy="38" r="13" />
    </symbol>
  </svg>

  <div class="auth-page">
    <div class="auth-card wide">
      <div class="auth-header">
        <div class="logo">
          <svg class="mark" viewBox="0 0 100 100">
            <use href="#paw" fill="currentColor" />
          </svg>
          <span>Pawvlog <em>by Superpet</em></span>
        </div>
        <h1>Únete a la manada</h1>
        <p>Crea tu cuenta y registra a tus perritos para empezar su Pawvlog.</p>
      </div>

      <form action="pawvlog-home.html">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          Tus Datos
        </div>

        <div class="dog-grid">
          <div class="form-group">
            <label for="username">Nombre de Usuario</label>
            <input type="text" id="username" placeholder="@tu_usuario" required>
          </div>
          <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" placeholder="tu@correo.com" required>
          </div>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Crea una contraseña segura" required>
        </div>

        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
            <path d="M12 2v20"></path>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
          </svg>
          Tus Perritos
        </div>

        <div class="dogs-container" id="dogsContainer">
          <div class="dog-entry">
            <div class="dog-entry-header">
              <span>Perrito #1</span>
            </div>
            <div class="dog-grid">
              <div class="form-group">
                <label>Nombre del perro</label>
                <input type="text" placeholder="Ej. Yuna" required>
              </div>
              <div class="form-group">
                <label>Raza</label>
                <input type="text" placeholder="Ej. Shiba Inu" required>
              </div>
              <div class="form-group">
                <label>Edad (meses)</label>
                <input type="number" min="0" placeholder="Ej. 24" required>
              </div>
              <div class="form-group">
                <label>Intereses</label>
                <select required>
                  <option value="">Selecciona uno...</option>
                  <option value="friendly">#friendly</option>
                  <option value="exploring">#exploring</option>
                  <option value="eating">#eating</option>
                  <option value="napping">#napping</option>
                  <option value="fetch">#fetch</option>
                  <option value="sunspot">#sunspot</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <button type="button" class="btn-add-dog" id="addDogBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Añadir otro perrito
        </button>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 32px;">Crear mi cuenta</button>
      </form>

      <div class="auth-footer">
        ¿Ya tienes una cuenta? <a href="pawvlog-login.html">Inicia sesión</a>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/register.js"></script>

</body>

</html>
