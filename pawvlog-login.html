<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pawvlog — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/landing.css">
  <link rel="stylesheet" href="css/auth.css">
</head>

<body>

  <svg width="0" height="0" style="position:absolute">
    <symbol id="paw" viewBox="0 0 100 100">
      <ellipse cx="50" cy="66" rx="27" ry="23" />
      <circle cx="19" cy="36" r="13" />
      <circle cx="42" cy="17" r="12.5" />
      <circle cx="65" cy="17" r="12.5" />
      <circle cx="86" cy="38" r="13" />
    </symbol>
  </svg>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo">
          <svg class="mark" viewBox="0 0 100 100">
            <use href="#paw" fill="currentColor" />
          </svg>
          <span>Pawvlog <em>by Superpet</em></span>
        </div>
        <h1>¡Hola de nuevo!</h1>
        <p>Inicia sesión para ver qué hace tu manada.</p>
      </div>

      <form action="pawvlog-home.html">
        <div class="form-group">
          <label for="username">Usuario o Correo</label>
          <input type="text" id="username" placeholder="tu@correo.com" required>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Iniciar sesión</button>
      </form>

      <div class="auth-footer">
        ¿No tienes cuenta aún? <a href="pawvlog-register.html">Únete a la manada</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    document.querySelector('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const usernameInput = document.getElementById('username');
      const email = usernameInput.value;
      const pass = document.getElementById('password').value;
      const btn = e.target.querySelector('button');
      const existingError = document.getElementById('login-error');
      if (existingError) existingError.remove();

      btn.textContent = 'Iniciando sesión...';
      btn.disabled = true;

      try {
        if (window.PawvlogAPI) {
          const res = await window.PawvlogAPI.loginUser(email, pass);
          if (res && res.token) {
            localStorage.setItem('pawvlog_token', res.token);
            if (res.user && res.user._id) {
              localStorage.setItem('pawvlog_user_id', res.user._id);
            }
            window.location.href = 'pawvlog-home.html';
          } else {
            throw new Error(res.message || 'No se ha podido iniciar sesión. Usuario y/o contraseña inválidos.');
          }
        } else {
          throw new Error('No se pudo conectar con el servicio de inicio de sesión.');
        }
      } catch (err) {
        console.warn("Error en login:", err);
        const errorMsg = document.createElement('div');
        errorMsg.id = 'login-error';
        errorMsg.style.color = 'var(--red)';
        errorMsg.style.fontSize = '0.9rem';
        errorMsg.style.marginTop = '12px';
        errorMsg.style.textAlign = 'center';
        errorMsg.textContent = 'No se ha podido iniciar sesión. Usuario y/o contraseña inválidos.';
        btn.parentElement.appendChild(errorMsg);

        btn.textContent = 'Iniciar sesión';
        btn.disabled = false;
      }
    });
  </script>
</body>

</html>
